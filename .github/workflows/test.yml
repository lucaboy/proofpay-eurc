name: test-and-provenance

on:
  push:
  pull_request:
  workflow_dispatch:

permissions: {}

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

jobs:
  test:
    name: Node.js ${{ matrix.node-version }}
    permissions:
      contents: read
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version: [16, 22]
    runs-on: ubuntu-latest
    steps:
      - name: Check out the tested commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run offline tests
        run: npm test

  bundle:
    name: Deterministic submission bundle
    needs: test
    permissions:
      contents: read
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Check out the bundled commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Build and reproduce the submission bundle
        run: node scripts/build-submission-bundle.mjs --source-ref "$GITHUB_SHA" --verify

      - name: Upload submission bundle and checksum
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: proofpay-eurc-submission
          path: |
            dist/proofpay-eurc-submission.tar.gz
            dist/SHA256SUMS
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

  attest:
    name: Attest main-branch bundle
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: bundle
    permissions:
      id-token: write
      attestations: write
      artifact-metadata: write
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - name: Download the unprivileged build output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: proofpay-eurc-submission
          path: dist

      - name: Attest the checksummed submission bundle
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-checksums: dist/SHA256SUMS
