name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  node:
    strategy:
      matrix:
        node-version: [16, 22]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm test
